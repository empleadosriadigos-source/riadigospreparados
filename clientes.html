<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Riadigos · Clientes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --brand:#10B981;--brand-light:rgba(16,185,129,0.1);--brand-border:rgba(16,185,129,0.25);
    --bg:#F3F4F6;--surface:#fff;--border:#E5E7EB;--text:#111827;--muted:#6B7280;
    --danger:#EF4444;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── Navbar ─────────────────────────────────────────────────────── */
  .navbar{background:var(--brand);padding:0 20px;display:flex;align-items:center;height:52px;gap:24px;position:sticky;top:0;z-index:100;}
  .navbar-logo{color:#fff;font-weight:900;font-size:17px;letter-spacing:-.3px;text-decoration:none;}
  .navbar-logo span{opacity:.7;font-weight:400;}
  .nav-tabs{display:flex;gap:4px;flex:1;}
  .nav-tab{color:rgba(255,255,255,0.75);background:none;border:none;padding:6px 14px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
  .nav-tab:hover{color:#fff;background:rgba(255,255,255,0.12);}
  .nav-tab.active{color:#fff;background:rgba(255,255,255,0.2);}
  .navbar-user{color:rgba(255,255,255,0.8);font-size:13px;margin-left:auto;}
  .navbar-btn{color:#fff;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);padding:5px 12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
  .navbar-btn:hover{background:rgba(255,255,255,0.25);}

  /* ── Layout ──────────────────────────────────────────────────────── */
  .page{display:none;padding:20px;max-width:1200px;margin:0 auto;}
  .page.active{display:block;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .page-title{font-size:20px;font-weight:800;}

  /* ── Botones ─────────────────────────────────────────────────────── */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
  .btn-primary{background:var(--brand);color:#fff;}.btn-primary:hover{background:#059669;}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text);}.btn-ghost:hover{background:var(--bg);}
  .btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#DC2626;}
  .btn-sm{padding:5px 11px;font-size:13px;}
  .btn-copy{background:var(--brand);color:#fff;border:none;border-radius:5px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s;flex-shrink:0;}
  .btn-copy:hover,.btn-copy.copiado{background:#059669;}

  /* ── Cards de fijados ───────────────────────────────────────────── */
  .fijados-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .fijado-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative;}
  .fijado-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.10);transform:translateY(-2px);}
  .fijado-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
  .fijado-card-nombre{font-size:15px;font-weight:800;color:var(--text);line-height:1.2;flex:1;}
  .fijado-card-info{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .fijado-card-os{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .os-badge{background:var(--brand-light);color:var(--brand);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid var(--brand-border);}
  .btn-desfijar{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0 0 0 8px;opacity:0.35;transition:opacity .15s;flex-shrink:0;}
  .btn-desfijar:hover{opacity:1;color:var(--danger);}
  .empty-msg{color:var(--muted);font-size:14px;padding:40px 0;text-align:center;}

  /* ── Modal detalle (consulta) ───────────────────────────────────── */
  .detalle-section{font-size:10px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--brand);}
  .detalle-section:first-child{margin-top:0;}
  .detalle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:10px;}
  .detalle-row:last-child{border-bottom:none;}
  .detalle-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;min-width:82px;flex-shrink:0;}
  .detalle-val{font-size:14px;font-weight:600;flex:1;color:var(--text);}
  .detalle-os{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .detalle-os:last-child{margin-bottom:0;}
  .detalle-os-nombre{font-weight:800;font-size:14px;color:var(--text);margin-bottom:5px;}
  .detalle-os-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:4px;gap:8px;}
  .detalle-med{padding:7px 0;border-bottom:1px solid var(--border);}
  .detalle-med:last-child{border-bottom:none;}
  .detalle-med-nombre{font-size:13px;font-weight:700;color:var(--text);}
  .detalle-med-info{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;justify-content:space-between;}

  /* ── Lista clientes/OS ──────────────────────────────────────────── */
  .search-bar{display:flex;gap:10px;margin-bottom:16px;}
  .search-bar input{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);}
  .search-bar input:focus{outline:none;border-color:var(--brand);}
  .list-table{width:100%;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);border-collapse:collapse;overflow:hidden;}
  .list-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);}
  .list-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);}
  .list-table tr:last-child td{border-bottom:none;}
  .list-table tr.clickable{cursor:pointer;transition:background .1s;}
  .list-table tr.clickable:hover td{background:var(--bg);}
  .td-nombre{font-weight:700;}
  .td-muted{color:var(--muted);}
  .pagination{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:13px;color:var(--muted);}
  .pagination-btns{display:flex;gap:6px;}

  /* ── Modales ─────────────────────────────────────────────────────── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
  .modal-sm{max-width:420px;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .modal-header h2{font-size:17px;font-weight:800;}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;padding:2px;}
  .modal-body{padding:18px 22px;overflow-y:auto;flex:1;}
  .modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;}
  .field-group{margin-bottom:14px;}
  .field-group label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
  .field-group input,.field-group textarea,.field-group select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);}
  .field-group input:focus,.field-group textarea:focus,.field-group select:focus{outline:none;border-color:var(--brand);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .ficha-section{background:var(--bg);border-radius:8px;padding:12px 14px;margin-bottom:10px;}
  .ficha-section-title{font-size:11px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .sub-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);}
  .sub-item:last-child{border-bottom:none;}

  /* ── Toast ───────────────────────────────────────────────────────── */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;}
  #toast.show{opacity:1;}
  #toast.ok{background:#059669;}
  #toast.err{background:var(--danger);}

  /* ── OS vista ────────────────────────────────────────────────────── */
  .os-detalle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .os-detalle-row:last-child{border-bottom:none;}
  .os-detalle-label{color:var(--muted);font-weight:600;min-width:160px;}
  .os-detalle-val{font-weight:700;color:var(--text);}
  .os-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700;}
  .os-chip-si{background:rgba(16,185,129,0.1);color:var(--brand);border:1px solid var(--brand-border);}
  .os-chip-no{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.25);}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="navbar-logo" href="#">Riadigos<span>*</span></a>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="cambiarPagina('inicio')">Inicio</button>
    <button class="nav-tab" onclick="cambiarPagina('clientes')">Clientes</button>
    <button class="nav-tab" onclick="cambiarPagina('obras')">Obras Sociales</button>
  </div>
  <span class="navbar-user" id="navUser"></span>
  <button class="navbar-btn" onclick="cerrarSesion()">Cerrar sesión</button>
</nav>

<!-- ── INICIO ──────────────────────────────────────────────────────── -->
<div class="page active" id="pageInicio">
  <div class="page-header">
    <div class="page-title">Clientes fijados</div>
    <button class="btn btn-primary btn-sm" onclick="abrirModalFijar()">＋ Fijar cliente</button>
  </div>
  <div class="fijados-grid" id="gridFijados"></div>
  <div class="empty-msg" id="emptyFijados" style="display:none;">No hay clientes fijados. Usá el botón + Fijar cliente para agregar.</div>
</div>

<!-- ── CLIENTES ───────────────────────────────────────────────────── -->
<div class="page" id="pageClientes">
  <div class="page-header">
    <div class="page-title">Clientes</div>
    <button class="btn btn-primary btn-sm" onclick="abrirNuevoCliente()">＋ Nuevo cliente</button>
  </div>
  <div class="search-bar">
    <input type="text" id="buscarCliente" placeholder="Buscar por nombre, DNI o teléfono…" oninput="filtrarClientes()"/>
  </div>
  <table class="list-table">
    <thead><tr><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Obras sociales</th></tr></thead>
    <tbody id="tablaClientes"></tbody>
  </table>
  <div class="pagination">
    <span id="paginaInfoCli"></span>
    <div class="pagination-btns">
      <button class="btn btn-ghost btn-sm" id="btnPrevCli" onclick="paginaCli(-1)">← Anterior</button>
      <button class="btn btn-ghost btn-sm" id="btnNextCli" onclick="paginaCli(1)">Siguiente →</button>
    </div>
  </div>
</div>

<!-- ── OBRAS SOCIALES ─────────────────────────────────────────────── -->
<div class="page" id="pageObras">
  <div class="page-header">
    <div class="page-title">Obras Sociales</div>
    <button class="btn btn-primary btn-sm" onclick="abrirNuevaOS()">＋ Nueva obra social</button>
  </div>
  <div class="search-bar">
    <input type="text" id="buscarOS" placeholder="Buscar obra social…" oninput="filtrarOS()"/>
  </div>
  <table class="list-table">
    <thead><tr><th>Nombre</th><th>Genérico</th><th>Recetario</th><th>Vencimiento</th><th>Validador</th></tr></thead>
    <tbody id="tablaOS"></tbody>
  </table>
  <div class="pagination">
    <span id="paginaInfoOS"></span>
    <div class="pagination-btns">
      <button class="btn btn-ghost btn-sm" id="btnPrevOS" onclick="paginaOS(-1)">← Anterior</button>
      <button class="btn btn-ghost btn-sm" id="btnNextOS" onclick="paginaOS(1)">Siguiente →</button>
    </div>
  </div>
</div>

<!-- ════ MODALES ════════════════════════════════════════════════════ -->

<!-- Modal: Detalle cliente (consulta) -->
<div class="modal-overlay" id="modalDetalleCliente">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detalleClienteNombre"></h2>
      <button class="modal-close" onclick="cerrarModal('modalDetalleCliente')">✕</button>
    </div>
    <div class="modal-body" id="detalleClienteBody"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="cerrarModal('modalDetalleCliente')">Cerrar</button></div>
  </div>
</div>

<!-- Modal: Editar/Nuevo cliente -->
<div class="modal-overlay" id="modalEditarCliente">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="tituloEditarCliente">Nuevo cliente</h2>
      <button class="modal-close" onclick="cerrarModal('modalEditarCliente')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group"><label>Nombre <span style="color:var(--danger)">*</span></label><input type="text" id="ecNombre"/></div>
      <div class="field-row">
        <div class="field-group"><label>DNI</label><input type="text" id="ecDni"/></div>
        <div class="field-group"><label>Teléfono</label><input type="text" id="ecTelefono"/></div>
      </div>
      <div class="field-group"><label>Tarjeta de puntos</label><input type="text" id="ecZetti"/></div>
      <div class="field-group"><label>Observaciones</label><textarea id="ecObs" rows="3"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalEditarCliente')">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardarCliente" onclick="guardarCliente()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Fijar cliente -->
<div class="modal-overlay" id="modalFijar">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>Fijar cliente</h2>
      <button class="modal-close" onclick="cerrarModal('modalFijar')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label>Buscar cliente</label>
        <input type="text" id="fijarBuscar" placeholder="Escribí el nombre…" oninput="filtrarFijar()" autocomplete="off"/>
        <div id="fijarResultados" style="max-height:240px;overflow-y:auto;margin-top:8px;border:1px solid var(--border);border-radius:8px;display:none;"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="cerrarModal('modalFijar')">Cerrar</button></div>
  </div>
</div>

<!-- Modal: Detalle OS (consulta + editar) -->
<div class="modal-overlay" id="modalDetalleOS">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detalleOSNombre"></h2>
      <button class="modal-close" onclick="cerrarModal('modalDetalleOS')">✕</button>
    </div>
    <div class="modal-body" id="detalleOSBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalDetalleOS')">Cerrar</button>
      <button class="btn btn-primary" onclick="abrirEditarOS()">Editar</button>
    </div>
  </div>
</div>

<!-- Modal: Editar OS -->
<div class="modal-overlay" id="modalEditarOS" style="z-index:300;">
  <div class="modal">
    <div class="modal-header">
      <h2 id="tituloEditarOS">Nueva obra social</h2>
      <button class="modal-close" onclick="cerrarModal('modalEditarOS')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group"><label>Nombre <span style="color:var(--danger)">*</span></label><input type="text" id="eosNombre"/></div>
      <div class="field-row">
        <div class="field-group"><label>Admite genéricos</label>
          <select id="eosGenericos"><option value="">—</option><option value="true">Sí</option><option value="false">No</option></select>
        </div>
        <div class="field-group"><label>Genérico en receta</label>
          <select id="eosGenericoReceta"><option value="">—</option><option value="true">Sí</option><option value="false">No</option></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group"><label>Modificar nro afiliado</label>
          <select id="eosModAfiliado"><option value="">—</option><option value="true">Sí</option><option value="false">No</option></select>
        </div>
        <div class="field-group"><label>Diagnóstico requerido</label>
          <select id="eosDiagnostico"><option value="">—</option><option value="true">Sí</option><option value="false">No</option></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group"><label>Recetario</label><input type="text" id="eosRecetario"/></div>
        <div class="field-group"><label>Rec. electrónicas</label><input type="text" id="eosRecElec"/></div>
      </div>
      <div class="field-row">
        <div class="field-group"><label>Vencimiento receta</label><input type="text" id="eosVencimiento" placeholder="ej. 30 DIAS"/></div>
        <div class="field-group"><label>Validador</label><input type="text" id="eosValidador"/></div>
      </div>
      <div class="field-group"><label>Notas de afiliado</label><textarea id="eosNotasAfiliado" rows="2"></textarea></div>
      <div class="field-group"><label>Particularidades</label><textarea id="eosParticularidades" rows="3"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalEditarOS')">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardarOS" onclick="guardarOS()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL = 'https://zmxkazlpliapedsgbzhb.supabase.co/rest/v1';
  const SB_URL_BASE = 'https://zmxkazlpliapedsgbzhb.supabase.co';
  const SB_KEY = 'sb_publishable_7iSVOhG4YHUC9rFegjdJ4A_1GL4DTlV';
  let SB_TOKEN = null;
  const sbAuth = supabase.createClient(SB_URL_BASE, SB_KEY);

  function getH(extra){ return Object.assign({'apikey':SB_KEY,'Authorization':'Bearer '+(SB_TOKEN||SB_KEY)},extra||{}); }

  async function sbGet(path){
    const r=await fetch(`${SB_URL}/${path}`,{headers:getH({'Range-Unit':'items','Range':'0-4999'})});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
  async function sbPost(table,body){
    const r=await fetch(`${SB_URL}/${table}`,{method:'POST',headers:getH({'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(body)});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
  async function sbPatch(table,id,body){
    const r=await fetch(`${SB_URL}/${table}?id=eq.${id}`,{method:'PATCH',headers:getH({'Content-Type':'application/json'}),body:JSON.stringify(body)});
    if(!r.ok) throw new Error(await r.text());
  }
  async function sbDelete(path){
    const r=await fetch(`${SB_URL}/${path}`,{method:'DELETE',headers:getH()});
    if(!r.ok) throw new Error(await r.text());
  }

  function limpiar(o){ return Object.fromEntries(Object.entries(o).filter(([,v])=>v!=null&&v!=='')); }
  function escHtml(s){ const d=document.createElement('div');d.textContent=s??'';return d.innerHTML; }

  function mostrarToast(msg,tipo='ok'){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='show '+(tipo==='err'?'err':'ok');
    clearTimeout(t._t); t._t=setTimeout(()=>t.className='',2500);
  }

  function abrirModal(id){ document.getElementById(id).classList.add('open'); }
  function cerrarModal(id){ document.getElementById(id).classList.remove('open'); }

  function copiar(btn, texto){
    navigator.clipboard.writeText(texto).then(()=>{
      const orig=btn.textContent; btn.textContent='¡Copiado!'; btn.classList.add('copiado');
      setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copiado'); },1500);
    });
  }

  function chip(val){
    if(val===null||val===undefined) return '<span style="color:var(--muted)">—</span>';
    return val
      ? '<span class="os-chip os-chip-si">Sí</span>'
      : '<span class="os-chip os-chip-no">No</span>';
  }

  // ── Auth ──────────────────────────────────────────────────────────
  sbAuth.auth.onAuthStateChange(async (event, session)=>{
    SB_TOKEN = session?.access_token||null;
    if(session){
      document.getElementById('navUser').textContent = session.user.email.split('@')[0];
      await cargarTodo();
    } else {
      sbAuth.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://empleadosriadigos-source.github.io/riadigospreparados/clientes.html'}});
    }
  });

  async function cerrarSesion(){ await sbAuth.auth.signOut(); location.reload(); }

  // ── Datos ─────────────────────────────────────────────────────────
  let clientes=[], osSociales=[], fijados=[], clienteOSMap={};

  async function cargarTodo(){
    try{
      const [clis, cosRows, osRows, fijRows] = await Promise.all([
        sbGet('clientes?select=id,nombre,dni,telefono,tarjeta_zetti,observaciones&order=nombre.asc'),
        sbGet('cliente_obras_sociales?select=cliente_id,obras_sociales(id,nombre)'),
        sbGet('obras_sociales?order=nombre.asc'),
        sbGet('clientes_fijados?select=id,cliente_id&order=created_at.asc'),
      ]);
      clientes = clis;
      osSociales = osRows;
      fijados = fijRows;
      // Mapa cliente → obras sociales
      clienteOSMap = {};
      cosRows.forEach(r=>{ if(!clienteOSMap[r.cliente_id]) clienteOSMap[r.cliente_id]=[]; clienteOSMap[r.cliente_id].push(r.obras_sociales?.nombre||''); });
      renderFijados();
      renderTablaClientes();
      renderTablaOS();
    }catch(e){ mostrarToast('Error al cargar: '+e.message,'err'); }
  }

  // ── Navegación ────────────────────────────────────────────────────
  let paginaActual = 'inicio';
  function cambiarPagina(p){
    paginaActual = p;
    document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
    document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');
    document.querySelectorAll('.nav-tab')[['inicio','clientes','obras'].indexOf(p)].classList.add('active');
  }

  // ══ INICIO ════════════════════════════════════════════════════════
  function renderFijados(){
    const grid = document.getElementById('gridFijados');
    const empty = document.getElementById('emptyFijados');
    const lista = fijados.map(f=>clientes.find(c=>c.id===f.cliente_id)).filter(Boolean);
    if(!lista.length){ grid.innerHTML=''; empty.style.display=''; return; }
    empty.style.display='none';
    const osNombres = id => (clienteOSMap[id]||[]).join(', ');
    grid.innerHTML = lista.map(c=>`
      <div class="fijado-card" onclick="abrirDetalleCliente('${c.id}')">
        <div class="fijado-card-header">
          <div class="fijado-card-nombre">${escHtml(c.nombre)}</div>
          <button class="btn-desfijar" onclick="desfijarCliente(event,'${fijados.find(f=>f.cliente_id===c.id)?.id}')" title="Desfijar">×</button>
        </div>
        ${c.telefono?`<div class="fijado-card-info"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${escHtml(c.telefono)}</div>`:''}
        ${c.dni?`<div class="fijado-card-info"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>${escHtml(c.dni)}</div>`:''}
        ${(clienteOSMap[c.id]||[]).length?`<div class="fijado-card-os">${(clienteOSMap[c.id]||[]).map(o=>`<span class="os-badge">${escHtml(o)}</span>`).join('')}</div>`:''}
      </div>`).join('');
  }

  async function abrirDetalleCliente(id){
    const c = clientes.find(x=>x.id===id);
    if(!c) return;
    document.getElementById('detalleClienteNombre').textContent = c.nombre;
    document.getElementById('detalleClienteBody').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px;">Cargando…</div>';
    abrirModal('modalDetalleCliente');
    try{
      const [osRows, meds, prods] = await Promise.all([
        sbGet(`cliente_obras_sociales?cliente_id=eq.${id}&select=*,obras_sociales(nombre,notas_afiliado),planes_os(nombre)`),
        sbGet(`cliente_medicamentos?cliente_id=eq.${id}&order=nombre.asc`),
        sbGet(`cliente_productos?cliente_id=eq.${id}&order=nombre.asc`),
      ]);
      let html = '';

      // Datos básicos
      html += '<div class="detalle-section">Datos</div>';
      if(c.dni) html += `<div class="detalle-row"><span class="detalle-label">DNI</span><span class="detalle-val">${escHtml(c.dni)}</span><button class="btn-copy" onclick="copiar(this,'${escHtml(c.dni)}')">Copiar</button></div>`;
      if(c.telefono) html += `<div class="detalle-row"><span class="detalle-label">Teléfono</span><span class="detalle-val">${escHtml(c.telefono)}</span><button class="btn-copy" onclick="copiar(this,'${escHtml(c.telefono)}')">Copiar</button></div>`;
      if(c.tarjeta_zetti) html += `<div class="detalle-row"><span class="detalle-label">T. puntos</span><span class="detalle-val">${escHtml(c.tarjeta_zetti)}</span><button class="btn-copy" onclick="copiar(this,'${escHtml(c.tarjeta_zetti)}')">Copiar</button></div>`;
      if(c.observaciones) html += `<div class="detalle-row"><span class="detalle-label">Notas</span><span class="detalle-val" style="color:var(--muted);font-weight:400;">${escHtml(c.observaciones)}</span></div>`;
      if(!c.dni&&!c.telefono&&!c.tarjeta_zetti&&!c.observaciones) html += '<div style="color:var(--muted);font-size:13px;padding:4px 0;">Sin datos adicionales.</div>';

      // Obras sociales
      if(osRows.length){
        html += '<div class="detalle-section">Obras sociales</div>';
        osRows.forEach(r=>{
          const nota = r.obras_sociales?.notas_afiliado;
          html += `<div class="detalle-os">
            <div class="detalle-os-nombre">${escHtml(r.obras_sociales?.nombre||'—')}${r.planes_os?.nombre?` <span style="font-weight:400;font-size:12px;color:var(--muted);">· ${escHtml(r.planes_os.nombre)}</span>`:''}</div>
            ${r.nro_afiliado?`<div class="detalle-os-row"><span>Nro afiliado: <b style="color:var(--text);">${escHtml(r.nro_afiliado)}</b></span><button class="btn-copy" onclick="copiar(this,'${escHtml(r.nro_afiliado)}')">Copiar</button></div>`:''}
            ${nota?`<div class="detalle-os-row" style="color:var(--brand);font-size:12px;">⚠ ${escHtml(nota)}</div>`:''}
            ${r.coseguro?`<div class="detalle-os-row"><span>Coseguro: ${escHtml(r.coseguro)}</span></div>`:''}
          </div>`;
        });
      }

      // Medicamentos
      if(meds.length){
        html += '<div class="detalle-section">Medicamentos</div>';
        meds.forEach(m=>{
          html += `<div class="detalle-med">
            <div class="detalle-med-nombre">${escHtml(m.nombre)}${m.marca?` <span style="font-weight:400;color:var(--muted);">· ${escHtml(m.marca)}</span>`:''}</div>
            <div class="detalle-med-info">
              <span>${[m.miligramos,m.cantidad].filter(Boolean).map(escHtml).join(' · ')||''}</span>
              ${m.codigo_barras?`<button class="btn-copy" onclick="copiar(this,'${escHtml(m.codigo_barras)}')">Cód: ${escHtml(m.codigo_barras)}</button>`:''}
            </div>
          </div>`;
        });
      }

      // Productos
      if(prods.length){
        html += '<div class="detalle-section">Productos</div>';
        prods.forEach(p=>{
          html += `<div class="detalle-med">
            <div class="detalle-med-nombre">${escHtml(p.nombre)}</div>
            ${p.codigo_barras?`<div class="detalle-med-info"><span></span><button class="btn-copy" onclick="copiar(this,'${escHtml(p.codigo_barras)}')">Cód: ${escHtml(p.codigo_barras)}</button></div>`:''}
          </div>`;
        });
      }

      document.getElementById('detalleClienteBody').innerHTML = html;
    }catch(e){ document.getElementById('detalleClienteBody').innerHTML = `<div style="color:var(--danger);">Error: ${e.message}</div>`; }
  }

  // Fijar/Desfijar
  async function desfijarCliente(e, fijadoId){
    e.stopPropagation();
    if(!fijadoId) return;
    try{
      await sbDelete(`clientes_fijados?id=eq.${fijadoId}`);
      fijados = fijados.filter(f=>f.id!==fijadoId);
      renderFijados();
      mostrarToast('Cliente desfijado','ok');
    }catch(err){ mostrarToast('Error: '+err.message,'err'); }
  }

  function abrirModalFijar(){
    document.getElementById('fijarBuscar').value='';
    document.getElementById('fijarResultados').style.display='none';
    document.getElementById('fijarResultados').innerHTML='';
    abrirModal('modalFijar');
    setTimeout(()=>document.getElementById('fijarBuscar').focus(),100);
  }

  function filtrarFijar(){
    const q = document.getElementById('fijarBuscar').value.toLowerCase();
    const cont = document.getElementById('fijarResultados');
    if(!q){ cont.style.display='none'; return; }
    const lista = clientes.filter(c=>c.nombre.toLowerCase().includes(q)).slice(0,20);
    if(!lista.length){ cont.innerHTML='<div style="padding:10px;color:var(--muted);font-size:13px;">Sin resultados</div>'; cont.style.display='block'; return; }
    cont.innerHTML = lista.map(c=>`
      <div onclick="fijarCliente('${c.id}')" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;transition:background .1s;"
        onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
        ${escHtml(c.nombre)}
        <span style="font-size:12px;color:var(--muted);font-weight:400;">${c.telefono?'· '+c.telefono:''}</span>
      </div>`).join('');
    cont.style.display='block';
  }

  async function fijarCliente(clienteId){
    if(fijados.find(f=>f.cliente_id===clienteId)){ mostrarToast('Ya está fijado','err'); return; }
    try{
      const nuevo = await sbPost('clientes_fijados',{cliente_id:clienteId});
      fijados.push(nuevo[0]);
      renderFijados();
      cerrarModal('modalFijar');
      mostrarToast('✓ Cliente fijado','ok');
    }catch(e){ mostrarToast('Error: '+e.message,'err'); }
  }

  // ══ CLIENTES ══════════════════════════════════════════════════════
  let paginaCliActual=0, filtroCliActual='';
  const POR_PAG = 30;

  function filtrarClientes(){ filtroCliActual=document.getElementById('buscarCliente').value.toLowerCase(); paginaCliActual=0; renderTablaClientes(); }
  function paginaCli(d){ paginaCliActual+=d; renderTablaClientes(); }

  function renderTablaClientes(){
    const fil = clientes.filter(c=>
      c.nombre.toLowerCase().includes(filtroCliActual)||
      (c.dni||'').includes(filtroCliActual)||
      (c.telefono||'').includes(filtroCliActual)
    );
    const total = fil.length;
    const ini = paginaCliActual*POR_PAG;
    const pag = fil.slice(ini, ini+POR_PAG);
    const tbody = document.getElementById('tablaClientes');
    tbody.innerHTML = pag.map(c=>`
      <tr class="clickable" onclick="abrirEditarCliente('${c.id}')">
        <td class="td-nombre">${escHtml(c.nombre)}</td>
        <td class="td-muted">${escHtml(c.dni||'—')}</td>
        <td class="td-muted">${escHtml(c.telefono||'—')}</td>
        <td class="td-muted">${escHtml((clienteOSMap[c.id]||[]).join(', ')||'—')}</td>
      </tr>`).join('');
    document.getElementById('paginaInfoCli').textContent = `${ini+1}–${Math.min(ini+POR_PAG,total)} de ${total}`;
    document.getElementById('btnPrevCli').disabled = paginaCliActual===0;
    document.getElementById('btnNextCli').disabled = ini+POR_PAG>=total;
    if(paginaCliActual===0) paginaCliActual=0;
  }

  let clienteEditId = null;

  function abrirNuevoCliente(){
    clienteEditId=null;
    document.getElementById('tituloEditarCliente').textContent='Nuevo cliente';
    ['ecNombre','ecDni','ecTelefono','ecZetti','ecObs'].forEach(id=>document.getElementById(id).value='');
    abrirModal('modalEditarCliente');
    setTimeout(()=>document.getElementById('ecNombre').focus(),100);
  }

  function abrirEditarCliente(id){
    const c = clientes.find(x=>x.id===id);
    if(!c) return;
    clienteEditId = id;
    document.getElementById('tituloEditarCliente').textContent='Editar cliente';
    document.getElementById('ecNombre').value=c.nombre||'';
    document.getElementById('ecDni').value=c.dni||'';
    document.getElementById('ecTelefono').value=c.telefono||'';
    document.getElementById('ecZetti').value=c.tarjeta_zetti||'';
    document.getElementById('ecObs').value=c.observaciones||'';
    abrirModal('modalEditarCliente');
  }

  async function guardarCliente(){
    const nombre=document.getElementById('ecNombre').value.trim();
    if(!nombre){ mostrarToast('El nombre es obligatorio','err'); return; }
    const btn=document.getElementById('btnGuardarCliente'); btn.disabled=true; btn.textContent='Guardando…';
    const body=limpiar({nombre,dni:document.getElementById('ecDni').value||null,telefono:document.getElementById('ecTelefono').value||null,tarjeta_zetti:document.getElementById('ecZetti').value||null,observaciones:document.getElementById('ecObs').value||null});
    try{
      if(clienteEditId){
        await sbPatch('clientes',clienteEditId,body);
        const idx=clientes.findIndex(c=>c.id===clienteEditId);
        if(idx>=0) clientes[idx]={...clientes[idx],...body};
        mostrarToast('✓ Cliente actualizado','ok');
      } else {
        const nuevo=await sbPost('clientes',{...body,fecha_alta:new Date().toISOString().slice(0,10)});
        clientes.push(nuevo[0]);
        clientes.sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
        mostrarToast('✓ Cliente creado','ok');
      }
      cerrarModal('modalEditarCliente');
      renderTablaClientes();
      renderFijados();
    }catch(e){ mostrarToast('Error: '+e.message,'err'); }
    btn.disabled=false; btn.textContent='Guardar';
  }

  // ══ OBRAS SOCIALES ════════════════════════════════════════════════
  let paginaOSActual=0, filtroOSActual='', osActualId=null;

  function filtrarOS(){ filtroOSActual=document.getElementById('buscarOS').value.toLowerCase(); paginaOSActual=0; renderTablaOS(); }
  function paginaOS(d){ paginaOSActual+=d; renderTablaOS(); }

  function renderTablaOS(){
    const fil = osSociales.filter(o=>o.nombre.toLowerCase().includes(filtroOSActual));
    const total=fil.length, ini=paginaOSActual*POR_PAG;
    const pag=fil.slice(ini,ini+POR_PAG);
    const tbody=document.getElementById('tablaOS');
    tbody.innerHTML=pag.map(o=>`
      <tr class="clickable" onclick="abrirDetalleOS('${o.id}')">
        <td class="td-nombre">${escHtml(o.nombre)}</td>
        <td>${chip(o.admite_genericos)}</td>
        <td class="td-muted">${escHtml(o.recetario||'—')}</td>
        <td class="td-muted">${escHtml(o.vencimiento_receta||'—')}</td>
        <td class="td-muted">${escHtml(o.validador||'—')}</td>
      </tr>`).join('');
    document.getElementById('paginaInfoOS').textContent=`${ini+1}–${Math.min(ini+POR_PAG,total)} de ${total}`;
    document.getElementById('btnPrevOS').disabled=paginaOSActual===0;
    document.getElementById('btnNextOS').disabled=ini+POR_PAG>=total;
  }

  function abrirDetalleOS(id){
    const o=osSociales.find(x=>x.id===id);
    if(!o) return;
    osActualId=id;
    document.getElementById('detalleOSNombre').textContent=o.nombre;
    document.getElementById('detalleOSBody').innerHTML=`
      <div class="os-detalle-row"><span class="os-detalle-label">Admite genéricos</span><span class="os-detalle-val">${chip(o.admite_genericos)}</span></div>
      <div class="os-detalle-row"><span class="os-detalle-label">Genérico en receta</span><span class="os-detalle-val">${chip(o.generico_en_receta)}</span></div>
      <div class="os-detalle-row"><span class="os-detalle-label">Modificar nro afiliado</span><span class="os-detalle-val">${chip(o.se_puede_modificar_afiliado)}</span></div>
      <div class="os-detalle-row"><span class="os-detalle-label">Diagnóstico requerido</span><span class="os-detalle-val">${chip(o.diagnostico_requerido)}</span></div>
      ${o.recetario?`<div class="os-detalle-row"><span class="os-detalle-label">Recetario</span><span class="os-detalle-val">${escHtml(o.recetario)}</span></div>`:''}
      ${o.rec_electronicas?`<div class="os-detalle-row"><span class="os-detalle-label">Rec. electrónicas</span><span class="os-detalle-val">${escHtml(o.rec_electronicas)}</span></div>`:''}
      ${o.vencimiento_receta?`<div class="os-detalle-row"><span class="os-detalle-label">Vencimiento</span><span class="os-detalle-val">${escHtml(o.vencimiento_receta)}</span></div>`:''}
      ${o.validador?`<div class="os-detalle-row"><span class="os-detalle-label">Validador</span><span class="os-detalle-val">${escHtml(o.validador)}</span></div>`:''}
      ${o.notas_afiliado?`<div class="os-detalle-row" style="background:rgba(16,185,129,0.06);border-radius:8px;padding:10px 12px;margin:8px 0;"><span class="os-detalle-label">Notas afiliado</span><span class="os-detalle-val" style="color:var(--brand);">${escHtml(o.notas_afiliado)}</span></div>`:''}
      ${o.particularidades?`<div class="os-detalle-row"><span class="os-detalle-label">Particularidades</span><span class="os-detalle-val" style="font-weight:400;">${escHtml(o.particularidades)}</span></div>`:''}
    `;
    abrirModal('modalDetalleOS');
  }

  function abrirNuevaOS(){
    osActualId=null;
    document.getElementById('tituloEditarOS').textContent='Nueva obra social';
    ['eosNombre','eosRecetario','eosRecElec','eosVencimiento','eosValidador','eosNotasAfiliado','eosParticularidades'].forEach(id=>document.getElementById(id).value='');
    ['eosGenericos','eosGenericoReceta','eosModAfiliado','eosDiagnostico'].forEach(id=>document.getElementById(id).value='');
    abrirModal('modalEditarOS');
  }

  function abrirEditarOS(){
    const o=osSociales.find(x=>x.id===osActualId);
    if(!o) return;
    document.getElementById('tituloEditarOS').textContent='Editar: '+o.nombre;
    document.getElementById('eosNombre').value=o.nombre||'';
    document.getElementById('eosGenericos').value=o.admite_genericos===null?'':String(o.admite_genericos);
    document.getElementById('eosGenericoReceta').value=o.generico_en_receta===null?'':String(o.generico_en_receta);
    document.getElementById('eosModAfiliado').value=o.se_puede_modificar_afiliado===null?'':String(o.se_puede_modificar_afiliado);
    document.getElementById('eosDiagnostico').value=o.diagnostico_requerido===null?'':String(o.diagnostico_requerido);
    document.getElementById('eosRecetario').value=o.recetario||'';
    document.getElementById('eosRecElec').value=o.rec_electronicas||'';
    document.getElementById('eosVencimiento').value=o.vencimiento_receta||'';
    document.getElementById('eosValidador').value=o.validador||'';
    document.getElementById('eosNotasAfiliado').value=o.notas_afiliado||'';
    document.getElementById('eosParticularidades').value=o.particularidades||'';
    abrirModal('modalEditarOS');
  }

  async function guardarOS(){
    const nombre=document.getElementById('eosNombre').value.trim();
    if(!nombre){ mostrarToast('El nombre es obligatorio','err'); return; }
    const btn=document.getElementById('btnGuardarOS'); btn.disabled=true; btn.textContent='Guardando…';
    const bv=v=>v===''?null:v==='true';
    const body=limpiar({
      nombre,
      admite_genericos:bv(document.getElementById('eosGenericos').value),
      generico_en_receta:bv(document.getElementById('eosGenericoReceta').value),
      se_puede_modificar_afiliado:bv(document.getElementById('eosModAfiliado').value),
      diagnostico_requerido:bv(document.getElementById('eosDiagnostico').value),
      recetario:document.getElementById('eosRecetario').value||null,
      rec_electronicas:document.getElementById('eosRecElec').value||null,
      vencimiento_receta:document.getElementById('eosVencimiento').value||null,
      validador:document.getElementById('eosValidador').value||null,
      notas_afiliado:document.getElementById('eosNotasAfiliado').value||null,
      particularidades:document.getElementById('eosParticularidades').value||null,
    });
    try{
      if(osActualId){
        await sbPatch('obras_sociales',osActualId,body);
        const idx=osSociales.findIndex(o=>o.id===osActualId);
        if(idx>=0) osSociales[idx]={...osSociales[idx],...body};
        mostrarToast('✓ Obra social actualizada','ok');
        cerrarModal('modalEditarOS');
        abrirDetalleOS(osActualId);
      } else {
        const nuevo=await sbPost('obras_sociales',body);
        osSociales.push(nuevo[0]);
        osSociales.sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
        mostrarToast('✓ Obra social creada','ok');
        cerrarModal('modalEditarOS');
      }
      renderTablaOS();
    }catch(e){ mostrarToast('Error: '+e.message,'err'); }
    btn.disabled=false; btn.textContent='Guardar';
  }

  // Cerrar modales con click fuera
  document.querySelectorAll('.modal-overlay').forEach(o=>{
    o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
  });
</script>
</body>
</html>
